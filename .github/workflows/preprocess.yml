name: Automated Data Preprocessing

# Trigger: tiap kali ada push ke branch main (raw dataset atau script berubah),
# plus bisa dipicu manual dari tab Actions (workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - "namadataset_raw/**"
      - "preprocessing/automate_Zikry-Adjie-Nugraha.py"
  workflow_dispatch:

concurrency:
  group: preprocess-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3

      - name: Run automated preprocessing
        working-directory: preprocessing
        run: python "automate_Zikry-Adjie-Nugraha.py"

        - name: Commit and push updated preprocessed dataset
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/namadataset_preprocessing/
          git diff --staged --quiet || git commit -m "chore: auto-update preprocessed dataset [skip ci]"
          git pull --rebase origin main
          git push
